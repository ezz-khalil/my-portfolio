<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="100%" style="background-color: transparent; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
    <!-- Definitions for gradients/markers -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
        </marker>
        <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#cd7f32" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#8c5015" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#b45309" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="source" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#0284c7" stop-opacity="0.3"/>
        </linearGradient>
    </defs>

    <!-- Base Group, center align -->
    <g transform="translate(400, 30)">
        
        <!-- Source Box -->
        <rect x="-120" y="0" width="240" height="70" rx="12" fill="url(#source)" stroke="#38bdf8" stroke-width="2"/>
        <text x="0" y="32" fill="#e0f2fe" text-anchor="middle" font-size="18" font-weight="bold">Source CSVs</text>
        <text x="0" y="52" fill="#bae6fd" text-anchor="middle" font-size="12">Databricks Volumes</text>

        <!-- Arrow 1 -->
        <line x1="0" y1="70" x2="0" y2="150" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
        <rect x="-85" y="95" width="170" height="30" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="0" y="114" fill="#c4b5fd" text-anchor="middle" font-size="12" font-weight="bold">PySpark Autoloader</text>

        <!-- Bronze Box -->
        <rect x="-140" y="160" width="280" height="80" rx="12" fill="url(#bronze)" stroke="#cd7f32" stroke-width="2"/>
        <text x="0" y="195" fill="#ffedd5" text-anchor="middle" font-size="18" font-weight="bold">Bronze Layer</text>
        <text x="0" y="220" fill="#fed7aa" text-anchor="middle" font-size="14">Raw Delta Tables</text>

        <!-- Arrow 2 -->
        <line x1="0" y1="240" x2="0" y2="320" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
        <rect x="-65" y="265" width="130" height="30" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="0" y="284" fill="#c4b5fd" text-anchor="middle" font-size="12" font-weight="bold">CDC + Upserts</text>

        <!-- Silver Box -->
        <rect x="-140" y="330" width="280" height="80" rx="12" fill="url(#silver)" stroke="#94a3b8" stroke-width="2"/>
        <text x="0" y="365" fill="#f1f5f9" text-anchor="middle" font-size="18" font-weight="bold">Silver Layer</text>
        <text x="0" y="390" fill="#cbd5e1" text-anchor="middle" font-size="14">Clean Tables (dbt Incremental)</text>

        <!-- Arrow 3 -->
        <line x1="0" y1="410" x2="0" y2="490" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
        <rect x="-85" y="435" width="170" height="30" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="0" y="454" fill="#c4b5fd" text-anchor="middle" font-size="12" font-weight="bold">dbt Snapshots / SCD2</text>

        <!-- Gold Box -->
        <rect x="-160" y="500" width="320" height="90" rx="12" fill="url(#gold)" stroke="#fbbf24" stroke-width="2"/>
        <text x="0" y="538" fill="#fef3c7" text-anchor="middle" font-size="20" font-weight="bold">Gold Layer</text>
        <text x="0" y="565" fill="#fde68a" text-anchor="middle" font-size="14">Dimensional Model (FactTrips + Dims)</text>
        
    </g>
</svg>
